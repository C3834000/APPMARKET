<!DOCTYPE html>
<html lang="he" dir="rtl">
<head><meta charset="UTF-8"><title>ניקוי cache</title></head>
<body style="font-family:sans-serif;text-align:center;padding:50px">
<h2>מנקה נתונים ישנים...</h2>
<p id="status">מוחק service workers ו-cache...</p>
<script>
(async function() {
  const s = document.getElementById("status");
  try {
    const regs = await navigator.serviceWorker.getRegistrations();
    for (const r of regs) { await r.unregister(); }
    s.textContent = "Service Workers נמחקו (" + regs.length + ")";
  } catch(e) { s.textContent = "SW: " + e.message; }
  try {
    const keys = await caches.keys();
    for (const k of keys) { await caches.delete(k); }
  } catch(e) {}
  setTimeout(function() {
    s.textContent = "מעביר לאפליקציה...";
    window.location.replace("/");
  }, 2000);
})();
</script>
</body>
</html>
