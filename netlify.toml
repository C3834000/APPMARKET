# לפני פריסה: ב-Netlify → האתר (לא Team) → Site configuration → Environment variables
#   SUPABASE_URL          (Project Settings → API → Project URL)
#   SUPABASE_ANON_KEY     (anon public)
# הבנייה יוצרת supabase-config.js שלא נכנס לגיט.
[build]
  command = "npm run build"
  publish = "."

[build.environment]
  NODE_VERSION = "20"

# שהדפדפן לא יישמר דף ישן אחרי פריסה — הרשימה והסקריפט יעודכנו
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
